name: Check code format

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check-format:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/determinate-nix-action@v3
      - run: nix fmt -- --fail-on-change
